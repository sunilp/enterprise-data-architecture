  <text x="1125" y="626" text-anchor="middle" font-size="10" font-weight="500" fill="#6b6b6b">Latency: min-hrs</text>

  <rect x="1210" y="610" width="120" height="24" rx="12" fill="none" stroke="#999"/>
  <text x="1270" y="626" text-anchor="middle" font-size="10" font-weight="500" fill="#6b6b6b">Append-only</text>

