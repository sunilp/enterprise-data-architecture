  <text x="1350" y="445" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">SILVER / CURATED</text>
  <text x="1350" y="478" text-anchor="middle" font-size="11" fill="#6b6b6b">Cleansed & conformed</text>
  <text x="1350" y="494" text-anchor="middle" font-size="11" fill="#6b6b6b">Deduplicated</text>
  <text x="1350" y="510" text-anchor="middle" font-size="11" fill="#6b6b6b">Business keys applied</text>
  <text x="1350" y="526" text-anchor="middle" font-size="11" fill="#6b6b6b">Quality validated</text>

