  <text x="370" y="685" text-anchor="middle" font-size="11" fill="#999">Cosmos / Firestore</text>

  <rect x="450" y="650" width="130" height="45" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="515" y="670" text-anchor="middle" font-size="12" font-weight="500" fill="#1a1a1a">Cache</text>
  <text x="515" y="685" text-anchor="middle" font-size="11" fill="#999">Redis / Memcache</text>

  <rect x="595" y="650" width="130" height="45" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="660" y="670" text-anchor="middle" font-size="12" font-weight="500" fill="#1a1a1a">Search</text>
  <text x="660" y="685" text-anchor="middle" font-size="11" fill="#999">Elasticsearch</text>

