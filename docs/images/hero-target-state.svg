  <text x="140" y="265" class="layer-label" fill="#666">LAYER 2</text>
  <text x="220" y="265" font-size="18" font-weight="500" fill="#fafaf8">Event / Message Backbone</text>
  <text x="960" y="290" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.5)">CDC  ·  Streaming Events  ·  Batch Extracts  ·  Change Notifications  ·  Domain Events</text>

  <!-- Split arrows from backbone -->
  <!-- Left arrow to Operational -->
  <path d="M480,310 L480,350" class="arrow"/>
  <!-- Right arrow to EDP -->
  <path d="M1200,310 L1200,350" class="arrow"/>

