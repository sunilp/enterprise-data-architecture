  <text x="240" y="615" class="layer-title" fill="#1a1a1a">Operational Data Store / Serving Stores</text>
  <text x="140" y="635" class="layer-desc">Current-state, low-latency, transactionally consistent</text>

  <rect x="160" y="650" width="130" height="45" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="225" y="670" text-anchor="middle" font-size="12" font-weight="500" fill="#1a1a1a">RDBMS</text>
  <text x="225" y="685" text-anchor="middle" font-size="11" fill="#999">PostgreSQL / SQL</text>

