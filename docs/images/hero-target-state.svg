  <!-- Layer 3: Operational Services -->
  <rect x="120" y="355" width="720" height="200" rx="4" fill="#fff" stroke="#e8e8e8" stroke-width="1"/>
  <text x="140" y="385" class="layer-label" fill="#999">LAYER 3</text>
  <text x="220" y="385" class="layer-title" fill="#1a1a1a">Operational Services & Workflows</text>
  <text x="140" y="405" class="layer-desc">Business process execution -- the systems that run the business</text>

  <!-- Operational service boxes -->
  <rect x="160" y="420" width="150" height="50" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="235" y="440" text-anchor="middle" font-size="12" font-weight="500" fill="#1a1a1a">Workflow Engine</text>
  <text x="235" y="456" text-anchor="middle" font-size="11" fill="#999">Temporal / BPM</text>

  <rect x="325" y="420" width="150" height="50" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="400" y="440" text-anchor="middle" font-size="12" font-weight="500" fill="#1a1a1a">Microservices</text>
  <text x="400" y="456" text-anchor="middle" font-size="11" fill="#999">APIs / Business Logic</text>

  <rect x="490" y="420" width="150" height="50" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="565" y="440" text-anchor="middle" font-size="12" font-weight="500" fill="#1a1a1a">Case Mgmt</text>
  <text x="565" y="456" text-anchor="middle" font-size="11" fill="#999">Claims / Disputes</text>

  <rect x="655" y="420" width="150" height="50" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="730" y="440" text-anchor="middle" font-size="12" font-weight="500" fill="#1a1a1a">Payments</text>
  <text x="730" y="456" text-anchor="middle" font-size="11" fill="#999">Settlement / Clearing</text>

  <!-- SLA badge -->
  <rect x="160" y="490" width="100" height="24" rx="12" fill="#1a1a1a"/>
  <text x="210" y="506" text-anchor="middle" font-size="10" font-weight="500" fill="#fafaf8">SLA: 99.9%+</text>

  <rect x="275" y="490" width="100" height="24" rx="12" fill="none" stroke="#1a1a1a"/>
  <text x="325" y="506" text-anchor="middle" font-size="10" font-weight="500" fill="#1a1a1a">Latency: ms</text>

  <rect x="390" y="490" width="80" height="24" rx="12" fill="none" stroke="#1a1a1a"/>
  <text x="430" y="506" text-anchor="middle" font-size="10" font-weight="500" fill="#1a1a1a">ACID</text>

