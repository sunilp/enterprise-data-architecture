  <rect x="730" y="935" width="170" height="70" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="815" y="960" text-anchor="middle" font-size="12" font-weight="500" fill="#1a1a1a">Regulatory</text>
