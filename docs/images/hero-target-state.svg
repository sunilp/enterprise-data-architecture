<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="IBM Plex Sans, -apple-system, sans-serif">
  <defs>
    <style>
      .layer-label { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
      .layer-title { font-size: 18px; font-weight: 500; }
      .layer-desc { font-size: 13px; fill: #6b6b6b; }
      .service-box text { font-size: 12px; }
      .arrow { stroke: #999; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-dashed { stroke: #999; stroke-width: 1.5; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrowhead); }
      .cross-cut-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; fill: #6b6b6b; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#999" stroke-width="1"/>
    </marker>
    <marker id="arrowhead-accent" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="#fafaf8"/>

  <!-- Title -->
  <text x="960" y="52" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="28" font-weight="500" fill="#1a1a1a">Target-State Enterprise Architecture</text>
  <text x="960" y="78" text-anchor="middle" font-size="14" fill="#6b6b6b">How enterprise data platforms and operational platforms coexist</text>

  <!-- Cross-cutting concerns - vertical bar on left -->
  <rect x="40" y="110" width="44" height="920" rx="4" fill="#1a1a1a"/>
  <text x="62" y="570" text-anchor="middle" transform="rotate(-90, 62, 570)" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#fafaf8">GOVERNANCE  ·  LINEAGE  ·  SECURITY  ·  OBSERVABILITY</text>

  <!-- Cross-cutting concerns - vertical bar on right -->
  <rect x="1836" y="110" width="44" height="920" rx="4" fill="#1a1a1a"/>
  <text x="1858" y="570" text-anchor="middle" transform="rotate(90, 1858, 570)" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#fafaf8">GOVERNANCE  ·  LINEAGE  ·  SECURITY  ·  OBSERVABILITY</text>

  <!-- ============ LAYER 1: SOURCE SYSTEMS ============ -->
  <rect x="120" y="110" width="1680" height="100" rx="4" fill="#fff" stroke="#e8e8e8" stroke-width="1"/>
  <text x="140" y="140" class="layer-label" fill="#999">LAYER 1</text>
  <text x="220" y="140" class="layer-title" fill="#1a1a1a">Source Systems</text>
  <!-- Source system boxes -->
  <rect x="160" y="155" width="120" height="40" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="220" y="180" text-anchor="middle" font-size="12" fill="#1a1a1a">ERP</text>
  <rect x="300" y="155" width="120" height="40" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="360" y="180" text-anchor="middle" font-size="12" fill="#1a1a1a">CRM</text>
  <rect x="440" y="155" width="140" height="40" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="510" y="180" text-anchor="middle" font-size="12" fill="#1a1a1a">Core Banking</text>
  <rect x="600" y="155" width="120" height="40" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="660" y="180" text-anchor="middle" font-size="12" fill="#1a1a1a">Payments</text>
  <rect x="740" y="155" width="160" height="40" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="820" y="180" text-anchor="middle" font-size="12" fill="#1a1a1a">Custom Apps</text>
  <rect x="920" y="155" width="140" height="40" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="990" y="180" text-anchor="middle" font-size="12" fill="#1a1a1a">Insurance Core</text>
  <rect x="1080" y="155" width="140" height="40" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="1150" y="180" text-anchor="middle" font-size="12" fill="#1a1a1a">Third Party</text>
  <rect x="1240" y="155" width="120" height="40" rx="3" fill="#f5f5f3" stroke="#e8e8e8"/>
  <text x="1300" y="180" text-anchor="middle" font-size="12" fill="#1a1a1a">IoT / Events</text>

  <!-- Arrows from Layer 1 to Layer 2 -->
  <path d="M960,210 L960,230" class="arrow"/>

