<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="IBM Plex Sans, -apple-system, sans-serif">
  <defs>
    <style>
      .card { fill: #fff; stroke: #e8e8e8; stroke-width: 1; }
      .card-number { font-family: Fraunces, Georgia, serif; font-size: 42px; font-weight: 300; fill: #e8e8e8; }
      .card-title { font-size: 17px; font-weight: 600; fill: #1a1a1a; }
      .card-desc { font-size: 13px; fill: #6b6b6b; }
      .card-break-label { font-size: 11px; font-weight: 500; fill: #cc4444; letter-spacing: 0.03em; }
      .icon-line { stroke: #1a1a1a; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .icon-fill { fill: #f5f5f3; stroke: #1a1a1a; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .icon-warning { fill: none; stroke: #cc4444; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="#fafaf8"/>

  <!-- Title area -->
  <text x="960" y="68" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="32" font-weight="500" fill="#1a1a1a">What Breaks When EDP Becomes Everything</text>
  <text x="960" y="100" text-anchor="middle" font-size="15" fill="#6b6b6b">Six anti-patterns that emerge when enterprise data platforms are positioned beyond their design boundary</text>

  <!-- Thin red accent line under title -->
  <line x1="860" y1="118" x2="1060" y2="118" stroke="#cc4444" stroke-width="2" stroke-linecap="round"/>

  <!-- ============ GRID: ROW 1 ============ -->
  <!-- Card dimensions: 520w x 320h, gutters 40px, left margin 120px -->

  <!-- CARD 1: Lakehouse as System of Record -->
  <rect x="120" y="160" width="520" height="340" rx="6" class="card"/>
  <!-- Red accent bar at top -->
  <rect x="120" y="160" width="520" height="4" rx="2" fill="#cc4444" opacity="0.7"/>

  <!-- Number -->
  <text x="156" y="222" class="card-number">1</text>

  <!-- Icon: database with warning triangle -->
  <g transform="translate(430, 188)">
    <!-- Database cylinder -->
    <ellipse cx="20" cy="8" rx="18" ry="7" class="icon-fill"/>
    <path d="M2,8 L2,32" class="icon-line"/>
    <path d="M38,8 L38,32" class="icon-line"/>
    <ellipse cx="20" cy="32" rx="18" ry="7" class="icon-fill" fill="none"/>
    <path d="M2,20 Q20,28 38,20" class="icon-line" opacity="0.4"/>
    <!-- Warning triangle -->
    <path d="M32,18 L42,34 L22,34 Z" class="icon-warning"/>
    <line x1="32" y1="24" x2="32" y2="29" class="icon-warning"/>
    <circle cx="32" cy="31.5" r="0.8" fill="#cc4444"/>
  </g>

  <!-- Title & description -->
  <text x="156" y="260" class="card-title">Lakehouse as System of Record</text>
  <text x="156" y="286" class="card-desc">Gold tables treated as operational current-state.</text>
  <text x="156" y="306" class="card-desc">Append-only, eventually-consistent stores mistaken</text>
  <text x="156" y="322" class="card-desc">for transactional sources of truth.</text>

  <!-- What breaks indicator -->
  <line x1="156" y1="348" x2="220" y2="348" stroke="#cc4444" stroke-width="1" opacity="0.5"/>
  <text x="156" y="370" class="card-break-label">WHAT BREAKS</text>
  <text x="156" y="388" font-size="12" fill="#6b6b6b">Stale reads, missing deletes, no ACID guarantees</text>
  <text x="156" y="404" font-size="12" fill="#6b6b6b">for operational consumers</text>

  <!-- Red dot accent -->
  <circle cx="144" cy="366" r="3" fill="#cc4444" opacity="0.8"/>


  <!-- CARD 2: Bronze/Silver/Gold as Workflow -->
  <rect x="680" y="160" width="520" height="340" rx="6" class="card"/>
  <rect x="680" y="160" width="520" height="4" rx="2" fill="#cc4444" opacity="0.7"/>

  <text x="716" y="222" class="card-number">2</text>

  <!-- Icon: layers with circular arrows -->
  <g transform="translate(990, 186)">
    <!-- Three stacked layers -->
    <path d="M0,20 L20,10 L40,20 L20,30 Z" class="icon-fill"/>
    <path d="M0,12 L20,2 L40,12 L20,22 Z" class="icon-fill"/>
    <path d="M0,28 L20,18 L40,28 L20,38 Z" class="icon-fill" fill="none"/>
    <!-- Circular arrow (loop) -->
    <path d="M44,14 Q54,14 54,24 Q54,34 44,34" class="icon-warning" fill="none"/>
    <path d="M44,34 L48,30 M44,34 L48,38" class="icon-warning"/>
  </g>

  <text x="716" y="260" class="card-title">Bronze/Silver/Gold as Workflow</text>
  <text x="716" y="286" class="card-desc">Data layers confused with business process stages.</text>
  <text x="716" y="306" class="card-desc">Medallion tiers are data quality refinement, not</text>
  <text x="716" y="322" class="card-desc">workflow states like "pending" or "approved."</text>

  <line x1="716" y1="348" x2="780" y2="348" stroke="#cc4444" stroke-width="1" opacity="0.5"/>
  <text x="716" y="370" class="card-break-label">WHAT BREAKS</text>
  <text x="716" y="388" font-size="12" fill="#6b6b6b">Business logic leaks into transformation layers,</text>
  <text x="716" y="404" font-size="12" fill="#6b6b6b">coupling process changes to data pipeline changes</text>

  <circle cx="704" cy="366" r="3" fill="#cc4444" opacity="0.8"/>


  <!-- CARD 3: Batch Governance + Real-Time -->
  <rect x="1240" y="160" width="560" height="340" rx="6" class="card"/>
  <rect x="1240" y="160" width="560" height="4" rx="2" fill="#cc4444" opacity="0.7"/>

  <text x="1276" y="222" class="card-number">3</text>

  <!-- Icon: clock with conflict / mismatch -->
  <g transform="translate(1570, 186)">
    <!-- Clock circle -->
    <circle cx="18" cy="18" r="16" class="icon-fill"/>
    <!-- Clock hands -->
    <line x1="18" y1="18" x2="18" y2="8" class="icon-line" stroke-width="1.5"/>
    <line x1="18" y1="18" x2="26" y2="18" class="icon-line" stroke-width="1.5"/>
    <!-- Conflict X -->
    <line x1="32" y1="28" x2="42" y2="38" class="icon-warning" stroke-width="2"/>
    <line x1="42" y1="28" x2="32" y2="38" class="icon-warning" stroke-width="2"/>
  </g>

  <text x="1276" y="260" class="card-title">Batch Governance + Real-Time Data</text>
  <text x="1276" y="286" class="card-desc">Governance designed for batch applied to streaming.</text>
  <text x="1276" y="306" class="card-desc">Quality checks, lineage, and access policies built for</text>
  <text x="1276" y="322" class="card-desc">nightly runs cannot keep pace with event-driven flows.</text>

  <line x1="1276" y1="348" x2="1340" y2="348" stroke="#cc4444" stroke-width="1" opacity="0.5"/>
  <text x="1276" y="370" class="card-break-label">WHAT BREAKS</text>
  <text x="1276" y="388" font-size="12" fill="#6b6b6b">Governance becomes the bottleneck, forcing teams to</text>
  <text x="1276" y="404" font-size="12" fill="#6b6b6b">bypass controls or accept hours-old data as "real-time"</text>

  <circle cx="1264" cy="366" r="3" fill="#cc4444" opacity="0.8"/>


  <!-- ============ GRID: ROW 2 ============ -->

  <!-- CARD 4: One Platform Because Strategic -->
  <rect x="120" y="540" width="520" height="340" rx="6" class="card"/>
  <rect x="120" y="540" width="520" height="4" rx="2" fill="#cc4444" opacity="0.7"/>

  <text x="156" y="602" class="card-number">4</text>

  <!-- Icon: single box overloaded with arrows pointing in -->
  <g transform="translate(430, 566)">
    <!-- Central box -->
    <rect x="8" y="8" width="24" height="24" rx="2" class="icon-fill"/>
    <!-- Arrows pointing inward from all sides -->
    <line x1="0" y1="20" x2="6" y2="20" class="icon-line" stroke-width="1.5"/>
    <path d="M4,17 L7,20 L4,23" class="icon-line" stroke-width="1"/>
    <line x1="40" y1="20" x2="34" y2="20" class="icon-line" stroke-width="1.5"/>
    <path d="M36,17 L33,20 L36,23" class="icon-line" stroke-width="1"/>
    <line x1="20" y1="0" x2="20" y2="6" class="icon-line" stroke-width="1.5"/>
    <path d="M17,4 L20,7 L23,4" class="icon-line" stroke-width="1"/>
    <line x1="20" y1="40" x2="20" y2="34" class="icon-line" stroke-width="1.5"/>
    <path d="M17,36 L20,33 L23,36" class="icon-line" stroke-width="1"/>
    <!-- Stress crack -->
    <path d="M14,14 L18,18 L14,22 L18,26" class="icon-warning" stroke-width="1"/>
  </g>

  <text x="156" y="640" class="card-title">One Platform Because Strategic</text>
  <text x="156" y="666" class="card-desc">All workloads forced onto one platform for "simplicity."</text>
  <text x="156" y="686" class="card-desc">Transactional, analytical, streaming, and ML workloads</text>
  <text x="156" y="702" class="card-desc">have fundamentally different requirements.</text>

  <line x1="156" y1="728" x2="220" y2="728" stroke="#cc4444" stroke-width="1" opacity="0.5"/>
  <text x="156" y="750" class="card-break-label">WHAT BREAKS</text>
  <text x="156" y="768" font-size="12" fill="#6b6b6b">Operational workloads get analytical SLAs; analytical</text>
  <text x="156" y="784" font-size="12" fill="#6b6b6b">workloads inherit operational cost structures</text>

  <circle cx="144" cy="746" r="3" fill="#cc4444" opacity="0.8"/>


  <!-- CARD 5: Analytical SLAs for Operations -->
  <rect x="680" y="540" width="520" height="340" rx="6" class="card"/>
  <rect x="680" y="540" width="520" height="4" rx="2" fill="#cc4444" opacity="0.7"/>

  <text x="716" y="602" class="card-number">5</text>

  <!-- Icon: SLA gauge/meter in red zone -->
  <g transform="translate(990, 566)">
    <!-- Gauge arc -->
    <path d="M4,32 A20,20 0 0,1 44,32" class="icon-fill" fill="none" stroke-width="2"/>
    <!-- Red zone on right side of gauge -->
    <path d="M36,14 A20,20 0 0,1 44,32" stroke="#cc4444" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Needle pointing to red zone -->
    <line x1="24" y1="30" x2="38" y2="16" stroke="#cc4444" stroke-width="2" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="24" cy="30" r="3" fill="#1a1a1a"/>
    <!-- Labels -->
    <text x="6" y="40" font-size="7" fill="#6b6b6b">99.9</text>
    <text x="36" y="40" font-size="7" fill="#cc4444">99.5</text>
  </g>

  <text x="716" y="640" class="card-title">Analytical SLAs for Operations</text>
  <text x="716" y="666" class="card-desc">99.5% uptime applied to customer-facing processes.</text>
  <text x="716" y="686" class="card-desc">Analytical platforms tolerate hours of downtime per</text>
  <text x="716" y="702" class="card-desc">month that operational systems cannot accept.</text>

  <line x1="716" y1="728" x2="780" y2="728" stroke="#cc4444" stroke-width="1" opacity="0.5"/>
  <text x="716" y="750" class="card-break-label">WHAT BREAKS</text>
  <text x="716" y="768" font-size="12" fill="#6b6b6b">Customer-facing processes inherit 43 hours/year</text>
  <text x="716" y="784" font-size="12" fill="#6b6b6b">downtime budget instead of 8.7 hours</text>

  <circle cx="704" cy="746" r="3" fill="#cc4444" opacity="0.8"/>


  <!-- CARD 6: Data Products Without Serving -->
  <rect x="1240" y="540" width="560" height="340" rx="6" class="card"/>
  <rect x="1240" y="540" width="560" height="4" rx="2" fill="#cc4444" opacity="0.7"/>

  <text x="1276" y="602" class="card-number">6</text>

  <!-- Icon: direct connection with X (no serving layer) -->
  <g transform="translate(1570, 566)">
    <!-- Left box (consumer) -->
    <rect x="0" y="12" width="14" height="16" rx="2" class="icon-fill"/>
    <!-- Right box (lakehouse) -->
    <rect x="30" y="6" width="18" height="28" rx="2" class="icon-fill"/>
    <!-- Direct arrow -->
    <line x1="14" y1="20" x2="30" y2="20" class="icon-line" stroke-width="1.5"/>
    <path d="M26,17 L30,20 L26,23" class="icon-line" stroke-width="1"/>
    <!-- X over the connection -->
    <line x1="18" y1="14" x2="26" y2="26" class="icon-warning" stroke-width="2"/>
    <line x1="26" y1="14" x2="18" y2="26" class="icon-warning" stroke-width="2"/>
  </g>

  <text x="1276" y="640" class="card-title">Data Products Without Serving</text>
  <text x="1276" y="666" class="card-desc">Operational consumers query the lakehouse directly.</text>
  <text x="1276" y="686" class="card-desc">Without a dedicated serving layer, every consumer</text>
  <text x="1276" y="702" class="card-desc">couples to the lakehouse's latency and availability.</text>

  <line x1="1276" y1="728" x2="1340" y2="728" stroke="#cc4444" stroke-width="1" opacity="0.5"/>
  <text x="1276" y="750" class="card-break-label">WHAT BREAKS</text>
  <text x="1276" y="768" font-size="12" fill="#6b6b6b">Operational queries compete with analytical workloads,</text>
  <text x="1276" y="784" font-size="12" fill="#6b6b6b">creating cascading failures across both domains</text>

  <circle cx="1264" cy="746" r="3" fill="#cc4444" opacity="0.8"/>


  <!-- ============ SUMMARY BAR ============ -->
  <rect x="120" y="930" width="1680" height="80" rx="6" fill="#1a1a1a"/>

  <!-- Left side: root cause label -->
  <text x="180" y="962" font-size="11" font-weight="600" letter-spacing="0.1em" text-transform="uppercase" fill="#666">ROOT CAUSE</text>

  <!-- Main message -->
  <text x="180" y="990" font-family="Fraunces, Georgia, serif" font-size="22" font-weight="400" fill="#fafaf8">Positioning failure, not technology failure.</text>

  <!-- Right side: supporting text -->
  <text x="1740" y="975" text-anchor="end" font-size="13" fill="#666">The platform works. The scope is wrong.</text>

  <!-- Small red accent dot before root cause -->
  <circle cx="160" cy="958" r="3" fill="#cc4444"/>

</svg>