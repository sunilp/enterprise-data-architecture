site_name: Enterprise Data Architecture
site_url: https://sunilp.github.io/enterprise-data-architecture/
site_description: Architecture position pack for enterprise data platforms -- strategy, blueprints, and decision frameworks
site_author: Sunil Prakash
repo_url: https://github.com/sunilp/enterprise-data-architecture
repo_name: sunilp/enterprise-data-architecture
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font: false
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Position:
    - What EDP Is: position/what-edp-is.md
    - EDP vs Operational: position/edp-vs-operational.md
    - Anti-Patterns: position/anti-patterns.md
  - Blueprints:
    - Target State Architecture: blueprints/target-state.md
    - Capability Architecture: blueprints/capability-architecture.md
    - Control Plane: blueprints/control-plane.md
    - AI/ML Platform Relationship: blueprints/ai-ml-platform.md
    - Coexistence Patterns: blueprints/coexistence-patterns.md
  - Decisions:
    - Decision Tree: decisions/decision-tree.md
    - Capability Map: decisions/capability-map.md
    - Data Mesh: decisions/data-mesh.md
    - Maturity Model: decisions/maturity-model.md
    - Vendor Evaluation: decisions/vendor-framework.md
    - Capability Maturity: decisions/capability-maturity.md
  - Patterns:
    - Data Contracts: patterns/data-contracts.md
    - Cost Architecture: patterns/cost-architecture.md
  - Compliance:
    - Overview: compliance/overview.md
    - Banking: compliance/banking.md
    - Healthcare: compliance/healthcare.md
    - Insurance: compliance/insurance.md
  - Operations:
    - Operating Model: operations/operating-model.md
    - Reliability Model: operations/reliability.md
  - Transformation:
    - Roadmap: transformation/roadmap.md
  - Proof:
    - Case Studies: proof/case-studies.md
    - Evidence Tables: proof/evidence.md
    - Decision Records: proof/decision-records.md
    - Metrics and Outcomes: proof/metrics.md
    - Review Checklists: proof/checklists.md
  - Glossary: glossary.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sunilp
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/sunilp

extra_css:
  - css/custom.css

extra_javascript:
  - js/diagram-viewer.js

copyright: >
  Copyright &copy; 2026 Sunil Prakash --
  <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>
